name: Build Rylai

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        macos-version: [macos-14, macos-15, macos-26]

    runs-on: ${{ matrix.macos-version }}

    env:
      DERIVED_DATA_PATH: build/DerivedData
      APP_PATH: build/DerivedData/Build/Products/Release/Rylai.app
      DMG_PATH: artifacts/Rylai.dmg

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Select Xcode 16.2 if available
      run: |
        if [ -d "/Applications/Xcode_16.2.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.2.app
        else
          echo "Xcode 16.2 not found, using default Xcode"
        fi

    - name: Show selected Xcode version
      run: xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        xcodegen generate --spec project.yml
        ls -la

    - name: List available schemes
      run: xcodebuild -list -project Rylai.xcodeproj

    - name: Build Rylai
      run: |
        xcodebuild -project Rylai.xcodeproj \
                   -scheme Rylai \
                   -configuration Release \
                   -derivedDataPath "$DERIVED_DATA_PATH" \
                   -destination 'platform=macOS' \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   MACOSX_DEPLOYMENT_TARGET=12.0 \
                   -quiet

    - name: Create app bundle
      run: |
        mkdir -p artifacts
        cp -R "$APP_PATH" "artifacts/Rylai.app"

    - name: Create DMG
      run: |
        hdiutil create \
          -volname "Rylai" \
          -srcfolder "artifacts/Rylai.app" \
          -ov \
          -format UDZO \
          "$DMG_PATH"

    - name: Verify app bundle
      run: |
        if [ -d "artifacts/Rylai.app" ]; then
          echo "App bundle created successfully"
          ls -la artifacts/Rylai.app/
        else
          echo "ERROR: App bundle not found"
          exit 1
        fi

        if [ -f "$DMG_PATH" ]; then
          echo "DMG created successfully"
          ls -lh "$DMG_PATH"
        else
          echo "ERROR: DMG not found"
          exit 1
        fi

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v6
      with:
        name: Rylai-${{ matrix.macos-version }}
        path: |
          artifacts/Rylai.app
          artifacts/Rylai.dmg
        retention-days: 30
