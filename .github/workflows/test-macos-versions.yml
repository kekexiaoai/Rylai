name: Test macOS Compatibility

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        macos-version: [macos-14, macos-15, macos-26]

    runs-on: ${{ matrix.macos-version }}

    env:
      DERIVED_DATA_PATH: build/DerivedData
      APP_PATH: build/DerivedData/Build/Products/Release/Rylai.app
      APP_BINARY_PATH: build/DerivedData/Build/Products/Release/Rylai.app/Contents/MacOS/Rylai

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Select Xcode 16.2 if available
      run: |
        if [ -d "/Applications/Xcode_16.2.app" ]; then
          sudo xcode-select -s /Applications/Xcode_16.2.app
        else
          echo "Xcode 16.2 not found, using default Xcode"
        fi

    - name: Show selected Xcode version
      run: xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        xcodegen generate --spec project.yml
        ls -la

    - name: List available schemes
      run: xcodebuild -list -project Rylai.xcodeproj

    - name: Build Rylai (macOS ${{ matrix.macos-version }})
      run: |
        xcodebuild -project Rylai.xcodeproj \
                   -scheme Rylai \
                   -configuration Release \
                   -derivedDataPath "$DERIVED_DATA_PATH" \
                   -destination 'generic/platform=macOS' \
                   ONLY_ACTIVE_ARCH=NO \
                   ARCHS="x86_64 arm64" \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   MACOSX_DEPLOYMENT_TARGET=12.0 \
                   -quiet

    - name: Check build output
      if: always()
      run: |
        echo "DerivedData contents:"
        find "$DERIVED_DATA_PATH" -maxdepth 5 \( -name "*.app" -o -name "*.xcresult" \) 2>/dev/null || echo "No build outputs found"
        test -d "$APP_PATH"
        lipo -info "$APP_BINARY_PATH"
        lipo "$APP_BINARY_PATH" -verify_arch x86_64 arm64
