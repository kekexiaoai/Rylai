name: Test macOS Compatibility

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        macos-version: [macos-13, macos-14, macos-15, macos-26]

    runs-on: ${{ matrix.macos-version }}

    env:
      DERIVED_DATA_PATH: build/DerivedData
      APP_PATH: build/DerivedData/Build/Products/Release/Rylai.app

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        xcodegen generate --spec project.yml
        ls -la

    - name: List available schemes
      run: xcodebuild -list -project Rylai.xcodeproj

    - name: Build Rylai (macOS ${{ matrix.macos-version }})
      run: |
        xcodebuild -project Rylai.xcodeproj \
                   -scheme Rylai \
                   -configuration Release \
                   -derivedDataPath "$DERIVED_DATA_PATH" \
                   -destination 'platform=macOS' \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   MACOSX_DEPLOYMENT_TARGET=12.0 \
                   -quiet

    - name: Check build output
      if: always()
      run: |
        echo "DerivedData contents:"
        find "$DERIVED_DATA_PATH" -maxdepth 5 \( -name "*.app" -o -name "*.xcresult" \) 2>/dev/null || echo "No build outputs found"
        test -d "$APP_PATH"
